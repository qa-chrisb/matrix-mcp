name: release

'on':
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.2.3). Must already exist or be created by this run.'
        required: true
        type: string

# Least-privilege default; jobs elevate only what they need.
permissions:
  contents: read

# Serialize release runs per ref, but NEVER cancel an in-flight release.
concurrency:
  group: release-${{ github.workflow }}-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.target }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # Native Linux builds only (no cross-compilation of the C SQLite +
        # rustls crypto stack). Each target == its host runner. arm64 uses the
        # free public-repo `ubuntu-24.04-arm` hosted runner.
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      # Resolve the tag BEFORE checkout so the workflow_dispatch path can check
      # out the exact tag's tree. Untrusted input is passed via an env var and
      # only ever referenced as a shell variable (never interpolated into the
      # script text), which prevents shell injection.
      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME:-}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not determine release tag."
            exit 1
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Refusing to build untrusted/invalid tag '$TAG'. Expected vMAJOR.MINOR.PATCH[-suffix]."
            exit 1
          fi
          VERSION="${TAG#v}"
          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} version=${VERSION}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For tag pushes, GITHUB_REF_NAME already equals the tag, so this is a
          # no-op. For workflow_dispatch, this checks out the dispatched tag's
          # tree (if it exists) instead of the launch ref, ensuring the built
          # binary and Cargo.toml correspond to the tag being released.
          ref: ${{ steps.tag.outputs.tag }}

      - name: Verify tag version matches Cargo.toml
        shell: bash
        env:
          TAG_VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail
          # Robust extraction: take the first `version = "..."` line that appears
          # after the [package] header, and read the value from inside the quotes
          # so inline comments cannot corrupt it.
          CARGO_VERSION="$(
            awk '
              /^[[:space:]]*\[/ { in_pkg = ($0 ~ /^[[:space:]]*\[package\][[:space:]]*$/) }
              in_pkg && /^[[:space:]]*version[[:space:]]*=/ {
                if (match($0, /"[^"]+"/)) {
                  print substr($0, RSTART + 1, RLENGTH - 2)
                  exit
                }
              }
            ' Cargo.toml
          )"
          echo "Cargo.toml version: ${CARGO_VERSION}"
          echo "Tag version:        ${TAG_VERSION}"
          if [ -z "$CARGO_VERSION" ]; then
            echo "::error::Could not parse version from Cargo.toml [package] section."
            exit 1
          fi
          if [ "${CARGO_VERSION}" != "${TAG_VERSION}" ]; then
            echo "::error::Tag version '${TAG_VERSION}' does not match Cargo.toml version '${CARGO_VERSION}'. Bump Cargo.toml before tagging."
            exit 1
          fi

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          BIN="matrix-mcp"
          STAGE="$(mktemp -d)"
          ARCHIVE="matrix-mcp-${VERSION}-${TARGET}.tar.gz"

          cp "target/${TARGET}/release/${BIN}" "${STAGE}/${BIN}"
          if [ -f README.md ]; then cp README.md "${STAGE}/README.md"; fi
          if [ -f LICENSE ]; then cp LICENSE "${STAGE}/LICENSE"; fi

          tar -czf "${ARCHIVE}" -C "${STAGE}" .

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "${ARCHIVE}" > "${ARCHIVE}.sha256"
          fi

          {
            echo "archive=${ARCHIVE}"
            echo "checksum=${ARCHIVE}.sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            matrix-mcp-${{ steps.tag.outputs.version }}-${{ matrix.target }}.tar.gz
            matrix-mcp-${{ steps.tag.outputs.version }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME:-}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Could not determine release tag."
            exit 1
          fi
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Refusing to release untrusted/invalid tag '$TAG'. Expected vMAJOR.MINOR.PATCH[-suffix]."
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          # A tag containing '-' (e.g. v1.2.3-rc1) is treated as a prerelease.
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List downloaded artifacts
        shell: bash
        run: ls -la dist

      - name: Verify artifact checksums
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd dist
          checksums=( *.sha256 )
          if [ "${#checksums[@]}" -eq 0 ]; then
            echo "::error::No .sha256 files found; cannot verify artifacts."
            exit 1
          fi
          for sum in "${checksums[@]}"; do
            echo "Verifying ${sum}"
            sha256sum -c "${sum}"
          done
          echo "All artifact checksums verified."

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Report secret availability
        shell: bash
        run: |
          if [ -n "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CARGO_REGISTRY_TOKEN is set; crate will be published."
          else
            echo "CARGO_REGISTRY_TOKEN is not set; skipping crate publish (no-op)."
          fi

      - name: Checkout
        if: env.CARGO_REGISTRY_TOKEN != ''
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust (stable)
        if: env.CARGO_REGISTRY_TOKEN != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: env.CARGO_REGISTRY_TOKEN != ''
        uses: Swatinem/rust-cache@v2

      - name: Publish crate
        if: env.CARGO_REGISTRY_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          # cargo publish is NOT idempotent: re-running a release for an
          # already-published version returns "crate version already exists".
          # Tolerate exactly that case so re-triggered releases do not fail,
          # while still surfacing any other publish error.
          set +e
          OUTPUT="$(cargo publish --locked 2>&1)"
          STATUS=$?
          set -e
          echo "${OUTPUT}"
          if [ "${STATUS}" -ne 0 ]; then
            if echo "${OUTPUT}" | grep -qiE 'already (exists|uploaded)|crate version .* is already'; then
              echo "::notice::This crate version is already published on crates.io; treating as success."
              exit 0
            fi
            exit "${STATUS}"
          fi
